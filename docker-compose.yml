version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: taskbankrest-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - taskbankrest_postgres_data:/var/lib/postgresql/data

volumes:
  taskbankrest_postgres_data:

