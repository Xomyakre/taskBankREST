spring.application.name=taskBankREST

# --- DataSource ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Liquibase ---
spring.liquibase.change-log=classpath:/db/migration/db.changelog-master.yaml
spring.liquibase.enabled=true

# --- MVC ---
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# --- App security (JWT) ---
app.security.jwt.secret=${JWT_SECRET:change-me-change-me-change-me-change-me}
app.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# --- Server ---
server.port=${PORT:8080}

# --- Springdoc Swagger ---
springdoc.swagger-ui.path=/swagger-ui.html
